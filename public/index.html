<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f4ef;
      --bg-2: #ece7de;
      --text: #2d261f;
      --muted: #7a6f62;
      --card: #ffffff;
      --line: #ddd4c8;
      --accent: #ff8f2a;
      --accent-soft: #ffd3a9;
      --danger: #e35a45;
      --shadow: 0 12px 30px rgba(77, 56, 24, 0.14);
      --dot: rgba(255, 143, 42, 0.25);
    }

    body.night {
      --bg: #14110d;
      --bg-2: #1e1812;
      --text: #f8f3ea;
      --muted: #cab9a2;
      --card: #221a12;
      --line: #3a2d1f;
      --accent: #ffaf44;
      --accent-soft: #5b3c1a;
      --danger: #ff7a66;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.4);
      --dot: rgba(255, 175, 68, 0.24);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sora', sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 420px at 100% -10%, rgba(255, 163, 77, 0.25), transparent 65%),
        linear-gradient(160deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      overflow: hidden;
      transition: background 0.25s ease, color 0.2s ease;
    }

    .dot-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--dot) 1.8px, transparent 1.8px);
      background-size: 24px 24px;
      opacity: 0.9;
    }

    .float-stack {
      position: fixed;
      right: 3%;
      top: 16%;
      width: 160px;
      height: 100px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.08));
      box-shadow: var(--shadow);
      transform: rotate(12deg);
      animation: bob 8s ease-in-out infinite;
      opacity: 0.7;
      z-index: 0;
    }

    .float-stack::before,
    .float-stack::after {
      content: '';
      position: absolute;
      border: 1px solid var(--line);
      border-radius: 14px;
      inset: 10px;
    }

    .float-stack::after {
      inset: 20px;
    }

    #launcher {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    #brand {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 800;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(860px, 100%);
      justify-content: flex-end;
    }

    #search {
      flex: 1;
      min-width: 170px;
      max-width: 360px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      font-size: 13px;
      font-family: inherit;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 143, 42, 0.18);
    }

    #mode-btn,
    #add-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    #mode-btn {
      position: relative;
      min-width: 46px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      overflow: hidden;
    }

    .coin {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      margin: 0 auto;
      background: radial-gradient(circle at 28% 25%, #fff6da 0%, #ffcc6f 45%, #f1972a 80%);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35), 0 2px 7px rgba(210, 120, 20, 0.45);
      transition: transform 0.3s ease;
    }

    body.night .coin {
      transform: rotateY(180deg);
      background: radial-gradient(circle at 28% 25%, #ffe6bf 0%, #ffb657 48%, #d27822 85%);
      animation: coinSpin 0.7s ease;
    }

    #add-btn {
      background: linear-gradient(145deg, var(--accent), #ffc070);
      color: #33200c;
      box-shadow: 0 8px 16px rgba(255, 143, 42, 0.28);
    }

    #grid {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    }

    .tile {
      min-height: 220px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transform: translateY(8px);
      opacity: 0;
      animation: in 0.36s ease forwards;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px rgba(77, 56, 24, 0.2);
    }

    .tile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 143, 42, 0.12), transparent);
    }

    .left-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .tile-title {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 4px 7px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .tile-actions {
      display: flex;
      gap: 5px;
    }

    .tile-btn {
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 7px;
      cursor: pointer;
    }

    .tile-btn:hover {
      background: rgba(255, 143, 42, 0.16);
      color: var(--text);
    }

    .tile-btn.delete:hover {
      background: rgba(227, 90, 69, 0.18);
      color: var(--danger);
    }

    .tile-preview {
      height: calc(100% - 46px);
      padding: 10px;
    }

    .preview-face {
      height: 100%;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 143, 42, 0.07), rgba(0, 0, 0, 0.02));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    .preview-face:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .preview-host {
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
      color: var(--text);
    }

    .preview-open {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #37230d;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      cursor: pointer;
    }

    .empty {
      min-height: 260px;
      grid-column: 1/-1;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: var(--card);
      color: var(--muted);
      display: grid;
      place-items: center;
      font-weight: 600;
    }

    #modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 30;
      align-items: center;
      justify-content: center;
      background: rgba(10, 8, 6, 0.45);
      backdrop-filter: blur(3px);
    }

    #modal-overlay.active {
      display: flex;
    }

    #modal {
      width: min(420px, calc(100vw - 28px));
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--card);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    #modal h2 {
      font-size: 17px;
      margin-bottom: 10px;
    }

    .form-row {
      display: grid;
      gap: 9px;
      margin-bottom: 10px;
    }

    .form-row input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      outline: none;
    }

    .form-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 143, 42, 0.18);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 9px;
      padding: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    #modal-cancel {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }

    #modal-save {
      background: var(--accent);
      color: #33200c;
    }

    @media (max-width: 860px) {
      .float-stack {
        display: none;
      }

      #topbar {
        flex-direction: column;
        align-items: stretch;
      }

      #controls {
        width: 100%;
      }

      #search {
        max-width: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    @keyframes in {
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(12deg); }
      50% { transform: translateY(-10px) rotate(9deg); }
    }

    @keyframes coinSpin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(540deg); }
    }
  </style>
</head>
<body>
  <div class="dot-layer" aria-hidden="true"></div>
  <div class="float-stack" aria-hidden="true"></div>

  <div id="launcher">
    <div id="topbar">
      <div id="brand">Launcher</div>
      <div id="controls">
        <input id="search" type="search" placeholder="Suchen" />
        <button id="mode-btn" type="button" onclick="toggleMode()" title="Night Mode">
          <div class="coin"></div>
        </button>
        <button id="add-btn" type="button" onclick="openModal()">+ App</button>
      </div>
    </div>

    <div id="grid"></div>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <h2 id="modal-title">App</h2>
      <div class="form-row">
        <input type="text" id="input-name" placeholder="Name" />
        <input type="url" id="input-url" placeholder="https://..." />
        <input type="text" id="input-category" placeholder="Kategorie" list="category-list" />
        <datalist id="category-list">
          <option value="Arbeit"></option>
          <option value="Social"></option>
          <option value="Tools"></option>
          <option value="Medien"></option>
          <option value="Shop"></option>
          <option value="Lernen"></option>
        </datalist>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel" type="button" onclick="closeModal()">Abbrechen</button>
        <button id="modal-save" type="button" onclick="saveTile()">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    let tiles = JSON.parse(localStorage.getItem('launcher_tiles') || '[]');
    let editingIndex = null;

    const TAG_COLORS = {
      arbeit: { bg: '#ebf4ff', fg: '#2f5eb2', bd: '#bfd5ff' },
      social: { bg: '#fff0ec', fg: '#b04a2f', bd: '#ffc7b7' },
      tools: { bg: '#edf7f2', fg: '#2e7a52', bd: '#bde7d1' },
      medien: { bg: '#f6edff', fg: '#6f44b3', bd: '#d9c2ff' },
      shop: { bg: '#fff6e8', fg: '#9e6422', bd: '#ffd9a5' },
      lernen: { bg: '#ebfbff', fg: '#266f84', bd: '#b6ecfb' },
      default: { bg: '#f3eee6', fg: '#715e45', bd: '#ded2c3' }
    };

    function save() {
      localStorage.setItem('launcher_tiles', JSON.stringify(tiles));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseHost(url) {
      try {
        return new URL(url).hostname.toLowerCase();
      } catch {
        return '';
      }
    }

    function normalizeUrl(rawUrl) {
      const trimmed = rawUrl.trim();
      if (!trimmed) return '';
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return 'https://' + trimmed;
    }

    function openExternal(url) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function tagColor(category) {
      const key = (category || '').trim().toLowerCase();
      return TAG_COLORS[key] || TAG_COLORS.default;
    }

    function autoCategoryFromUrl(url) {
      const host = parseHost(url);
      if (!host) return '';
      if (/news|video|youtube|netflix|spotify/.test(host)) return 'Medien';
      if (/github|jira|notion|slack|teams/.test(host)) return 'Arbeit';
      if (/instagram|facebook|x\.com|twitter|tiktok/.test(host)) return 'Social';
      if (/amazon|ebay|shop/.test(host)) return 'Shop';
      if (/learn|coursera|udemy|wikipedia/.test(host)) return 'Lernen';
      return 'Tools';
    }

    function buildPreviewHtml(tile, i) {
      const host = parseHost(tile.url) || tile.url;

      return `
        <div class="tile-preview">
          <div class="preview-face" onclick="openTile(${i})">
            <div class="preview-host" title="${escapeHtml(host)}">${escapeHtml(host)}</div>
            <button class="preview-open" type="button" onclick="event.stopPropagation();openTile(${i})">Oeffnen</button>
          </div>
        </div>`;
    }

    function render() {
      const grid = document.getElementById('grid');
      const query = document.getElementById('search').value.trim().toLowerCase();
      grid.innerHTML = '';

      const filtered = tiles.filter((tile) => {
        if (!query) return true;
        return [tile.name, tile.url, tile.category || ''].some((v) => String(v).toLowerCase().includes(query));
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty">Keine Treffer</div>`;
        return;
      }

      filtered.forEach((tile, i) => {
        const div = document.createElement('div');
        const category = tile.category || 'Tools';
        const color = tagColor(category);

        div.className = 'tile';
        div.style.animationDelay = `${Math.min(i * 50, 300)}ms`;

        div.innerHTML = `
          <div class="tile-header">
            <div class="left-head">
              <span class="tile-title" title="${escapeHtml(tile.name)}">${escapeHtml(tile.name)}</span>
              <span class="tag" style="background:${color.bg};color:${color.fg};border-color:${color.bd};">${escapeHtml(category)}</span>
            </div>
            <div class="tile-actions">
              <button class="tile-btn" type="button" title="Bearbeiten" onclick="event.stopPropagation();editTile(${tiles.indexOf(tile)})">Edit</button>
              <button class="tile-btn delete" type="button" title="Loeschen" onclick="event.stopPropagation();deleteTile(${tiles.indexOf(tile)})">Del</button>
            </div>
          </div>
          ${buildPreviewHtml(tile, tiles.indexOf(tile))}`;

        grid.appendChild(div);
      });
    }

    function openTile(i) {
      const tile = tiles[i];
      if (!tile) return;
      openExternal(tile.url);
    }

    function openModal(editIdx = null) {
      editingIndex = editIdx;
      const modal = document.getElementById('modal-overlay');
      document.getElementById('modal-title').textContent = editIdx !== null ? 'App bearbeiten' : 'App';
      document.getElementById('input-name').value = editIdx !== null ? tiles[editIdx].name : '';
      document.getElementById('input-url').value = editIdx !== null ? tiles[editIdx].url : '';
      document.getElementById('input-category').value = editIdx !== null ? (tiles[editIdx].category || '') : '';
      modal.classList.add('active');
      setTimeout(() => document.getElementById('input-name').focus(), 90);
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      editingIndex = null;
    }

    function saveTile() {
      const name = document.getElementById('input-name').value.trim();
      const rawUrl = document.getElementById('input-url').value;
      const normalizedUrl = normalizeUrl(rawUrl);
      let category = document.getElementById('input-category').value.trim();

      if (!name || !normalizedUrl) {
        alert('Name + URL');
        return;
      }

      try {
        new URL(normalizedUrl);
      } catch {
        alert('URL ungueltig');
        return;
      }

      if (!category) {
        category = autoCategoryFromUrl(normalizedUrl);
      }

      const payload = { name, url: normalizedUrl, category };

      if (editingIndex !== null) {
        tiles[editingIndex] = payload;
      } else {
        tiles.push(payload);
      }

      save();
      render();
      closeModal();
    }

    function editTile(i) {
      openModal(i);
    }

    function deleteTile(i) {
      if (confirm(`"${tiles[i].name}" loeschen?`)) {
        tiles.splice(i, 1);
        save();
        render();
      }
    }

    function toggleMode() {
      document.body.classList.toggle('night');
      localStorage.setItem('launcher_night', document.body.classList.contains('night') ? '1' : '0');
    }

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('active')) {
        saveTile();
      }

      if (event.key === 'Escape') {
        if (document.getElementById('modal-overlay').classList.contains('active')) {
          closeModal();
        }
      }
    });

    document.getElementById('search').addEventListener('input', render);

    if (localStorage.getItem('launcher_night') === '1') {
      document.body.classList.add('night');
    }

    tiles = tiles.map((tile) => {
      if (!tile.category) {
        return { ...tile, category: autoCategoryFromUrl(tile.url) };
      }
      return tile;
    });
    save();

    render();
  </script>
</body>
</html>
